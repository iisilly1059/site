
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>you can edit title here btw</title>
  <link rel="prefetch" href="/scram/scramjet.worker.js" />
  <link rel="prefetch" href="/scram/scramjet.shared.js" />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&amp;family=Inter+Tight:ital,wght@0,100..900;1,100..900&amp;family=Inter:wght@100..900&amp;display=swap&amp;"
    rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hind:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Hind:wght@300;400;500;600;700&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dreamland"></script>
  <script src="/baremux/index.js"></script>
  <script src="/scram/scramjet.all.js"></script>
  <script src="/config.js"></script>
</head>

<body>
  <div id="loading-container">
    <div class="loader-content">
      <div class="spinner"></div>
      <div class="status">edit this ok this is just a copy and paste from tglsc</div>
      <div class="config" id="config-display"></div>
    </div>
  </div>
  <div id="iframe-container"></div>

  <script>
    const { ScramjetController } = $scramjetLoadController();
    const scramjet = new ScramjetController({
      prefix: "/scramjet/",
      files: {
        wasm: "/scram/scramjet.wasm.wasm",
        all: "/scram/scramjet.all.js",
        sync: "/scram/scramjet.sync.js",
      }
    });
    scramjet.init();
    navigator.serviceWorker.register("./sw.js");

    const connection = new BareMux.BareMuxConnection("/baremux/worker.js");

    let selectedTransport = localStorage.getItem("transport");
    if (selectedTransport !== "/libcurl/index.mjs" && selectedTransport !== "/epoxy/index.mjs") {
        selectedTransport = "/epoxy/index.mjs";
    }

    const store = {
      url: "https://",
      wispurl:
        _CONFIG?.wispurl ||
        (location.protocol === "https:" ? "wss" : "ws") +
        "://" +
        location.host +
        "/wisp/",
      bareurl:
        _CONFIG?.bareurl ||
        (location.protocol === "https:" ? "https" : "http") +
        "://" +
        location.host +
        "/bare/",
      proxy: "",
      transport: selectedTransport,
    };

    (function() {
      var transport = localStorage.getItem('transport');
      var configName;

      if (transport === '/libcurl/index.mjs') {
        configName = 'Libcurl';
      } else if (transport === '/epoxy/index.mjs') {
        configName = 'Epoxy';
      } else if (transport === '/baremux/index.mjs') {
        configName = 'Baremux';
      } else {
        configName = 'Epoxy';
      }

      document.getElementById('config-display').textContent = 'config: ' + configName;
    })();

    function hideLoader() {
      document.getElementById('loading-container').style.display = 'none';
      document.getElementById('iframe-container').style.display = 'block';
    }

    async function loadFromHash() {
      const hash = window.location.hash.substring(1);

      await setTransport();

      const container = document.getElementById("iframe-container");
      container.innerHTML = "";

      const frame = scramjet.createFrame();
      container.appendChild(frame.frame);

      frame.frame.addEventListener('load', function() {
        hideLoader();
      });

      if (hash) {
        let url = hash;

        if (!url.startsWith("http://") && !url.startsWith("https://")) {
          url = "https://" + url;
        }
        
        frame.go(url);
      } else {
        frame.go("https://google.com/");
      }
    }

    async function setTransport() {
        try {
            await connection.setTransport(store.transport, [{ wisp: store.wispurl }]);
        } catch (e) {
            console.error("Failed to set transport: " + store.transport);
            if (store.transport !== "/epoxy/index.mjs") {
                await connection.setTransport("/epoxy/index.mjs", [{ wisp: store.wispurl }]);
            }
        }
    }

    window.addEventListener("hashchange", async () => {
      await loadFromHash();
    });

    window.addEventListener("load", async () => {
      await loadFromHash();
    });
  </script>
</body>
</html>
